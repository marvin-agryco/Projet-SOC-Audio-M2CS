services:
  # ============================================================
  # WAZUH STACK (SIEM / Log Collection)
  # ============================================================

  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.2
    hostname: wazuh-manager
    restart: unless-stopped
    ports:
      - "1514:1514"       # Agent registration
      - "1515:1515"       # Agent communication
      # 55000 removed: conflicts with WSL2 reserved ports
    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: SecretPassword
      FILEBEAT_SSL_VERIFICATION_MODE: none
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/ssl/filebeat.pem
      SSL_KEY: /etc/ssl/filebeat-key.pem
      API_USERNAME: wazuh-wui
      API_PASSWORD: MyS3cr37P450r.*-
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_var:/var/lib/filebeat
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat-key.pem
      - ./wazuh/integrations/soc-webhook.py:/var/ossec/integrations/custom-soc
    networks:
      - infra-net
      - soc-network

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.2
    hostname: wazuh-indexer
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/indexer-key.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/indexer.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem
      - ./wazuh/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - ./wazuh/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml
    networks:
      - infra-net

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.14.2
    hostname: wazuh-dashboard
    restart: unless-stopped
    ports:
      - "4443:5601"
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: SecretPassword
      WAZUH_API_URL: https://wazuh-manager
      DASHBOARD_USERNAME: kibanaserver
      DASHBOARD_PASSWORD: kibanaserver
      API_USERNAME: wazuh-wui
      API_PASSWORD: MyS3cr37P450r.*-
    volumes:
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./wazuh/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./wazuh/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
      - wazuh_dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      - wazuh-indexer
    networks:
      - infra-net

  # ============================================================
  # FIREWALL (Alpine iptables gateway between DMZ and infra-net)
  # ============================================================

  firewall:
    build:
      context: ./firewall
      dockerfile: Dockerfile
    hostname: firewall-gw
    environment:
      WAZUH_MANAGER: wazuh-manager
      ENDPOINT_NAME: firewall-gw
      SITE_ID: AUDIO_001
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - dmz-net
      - infra-net
    volumes:
      - firewall_logs:/var/log/firewall
    depends_on:
      - wazuh-manager
    restart: unless-stopped

  # ============================================================
  # SURICATA IDS (Network intrusion detection on DMZ)
  # ============================================================

  suricata:
    build:
      context: ./suricata
      dockerfile: Dockerfile
    hostname: suricata-ids
    environment:
      WAZUH_MANAGER: wazuh-manager
      ENDPOINT_NAME: suricata-ids
      SITE_ID: AUDIO_001
    cap_add:
      - NET_RAW
      - SYS_NICE
    networks:
      - dmz-net
      - infra-net
    volumes:
      - suricata_logs:/var/log/suricata
    depends_on:
      - wazuh-manager
    restart: unless-stopped

  # ============================================================
  # SIMULATED ENDPOINTS (Linux containers acting as workstations)
  # ============================================================

  endpoint-1:
    build:
      context: ./endpoints
      dockerfile: Dockerfile
    hostname: endpoint-pc-01
    environment:
      WAZUH_MANAGER: wazuh-manager
      ENDPOINT_NAME: endpoint-pc-01
      SITE_ID: AUDIO_001
    depends_on:
      - wazuh-manager
    networks:
      - infra-net
    restart: unless-stopped

  endpoint-2:
    build:
      context: ./endpoints
      dockerfile: Dockerfile
    hostname: endpoint-pc-02
    environment:
      WAZUH_MANAGER: wazuh-manager
      ENDPOINT_NAME: endpoint-pc-02
      SITE_ID: AUDIO_001
    depends_on:
      - wazuh-manager
    networks:
      - infra-net
    restart: unless-stopped

  # ============================================================
  # GLPI (IT Asset / CRM Management)
  # ============================================================

  glpi-db:
    image: mariadb:10.11
    hostname: glpi-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: glpi_root_pass
      MARIADB_DATABASE: glpi
      MARIADB_USER: glpi
      MARIADB_PASSWORD: glpi_pass
    volumes:
      - glpi_db_data:/var/lib/mysql
    networks:
      - infra-net

  glpi:
    image: diouxx/glpi:latest
    hostname: glpi-crm
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      TIMEZONE: Europe/Paris
    depends_on:
      - glpi-db
    volumes:
      - glpi_data:/var/www/html/glpi
    networks:
      - infra-net

# ============================================================
# NETWORKS
# ============================================================

networks:
  dmz-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
  infra-net:
    driver: bridge
  soc-network:
    external: true
    name: soc-project---sdv_default

# ============================================================
# VOLUMES
# ============================================================

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_var:
  wazuh_indexer_data:
  wazuh_dashboard_custom:
  glpi_db_data:
  glpi_data:
  firewall_logs:
  suricata_logs:

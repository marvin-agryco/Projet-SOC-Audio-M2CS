services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: soc-db
    environment:
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: soc_password
      POSTGRES_DB: soc_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_user -d soc_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for Celery)
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc-backend
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://soc_user:soc_password@db:5432/soc_dashboard
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - GLPI_URL=http://glpi-crm/apirest.php
      - GLPI_APP_TOKEN=b6W2NSYLqy3UF1spssoeQguYZcrVwNglT8QO0NoD
      - GLPI_USER_TOKEN=iqtYcWdxtcO330aHP1pimDehAInS38k26RzhNLMY
    ports:
      - "5000:5000"
    networks:
      - default
      - infrastructure_infra-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python run.py

  # Celery Worker (Alert Engine)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc-celery-worker
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://soc_user:soc_password@db:5432/soc_dashboard
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A celery_app.celery worker --loglevel=info

  # Celery Beat (Scheduled Tasks)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc-celery-beat
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://soc_user:soc_password@db:5432/soc_dashboard
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A celery_app.celery beat --loglevel=info

  # Ollama — local LLM inference for AI Triage (model: qwen2.5:1.5b)
  # One-time setup: docker exec soc-ollama ollama pull qwen2.5:1.5b
  ollama:
    image: ollama/ollama:latest
    container_name: soc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - default

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soc-frontend
    environment:
      - VITE_API_URL=http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

networks:
  infrastructure_infra-net:
    external: true

volumes:
  postgres_data:
  ollama_data:
